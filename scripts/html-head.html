<style>
  :root {
    color-scheme: light;
    --bg: #f7f7f3;
    --paper: #ffffff;
    --text: #1d2430;
    --muted: #5d6675;
    --line: #d8dde6;
    --accent: #0b6bcb;
    --code: #f0f3f7;
  }

  body {
    margin: 0 auto;
    max-width: 980px;
    padding: 48px 24px 72px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.6;
  }

  h1,
  h2,
  h3 {
    line-height: 1.2;
    color: #111827;
  }

  h1 {
    margin-top: 0;
    font-size: 2.3rem;
  }

  h2 {
    margin-top: 2.3rem;
    border-top: 1px solid var(--line);
    padding-top: 1.4rem;
  }

  a {
    color: var(--accent);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0 1.5rem;
    background: var(--paper);
  }

  th,
  td {
    border: 1px solid var(--line);
    padding: 0.7rem 0.8rem;
    text-align: left;
    vertical-align: top;
  }

  th {
    background: #eef3f8;
  }

  code {
    border-radius: 4px;
    background: var(--code);
    padding: 0.08rem 0.25rem;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 0.94em;
  }

  pre {
    overflow-x: auto;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
    padding: 1rem;
  }

  pre code {
    background: transparent;
    padding: 0;
  }

  blockquote {
    margin-left: 0;
    border-left: 4px solid var(--accent);
    padding-left: 1rem;
    color: var(--muted);
  }

  .mermaid {
    background: var(--paper);
    text-align: center;
  }
</style>

<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
  mermaid.initialize({ startOnLoad: true, theme: "default", securityLevel: "loose" });
</script>
